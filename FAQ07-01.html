<FONT SIZE="4" COLOR="#000000"><b>SPA-PRO Mail Server (2003) から SPA-PRO Mail @Solomon へ移行する場合</b></FONT>
<HR>
SPA-PRO Mail Server (2003) から SPA-PRO Mail @Solomon への移行手順は、各サービス停止後、同一フォルダに上書きインストールして下さい。<br>
<br>
インストールが完了すると、設定ウイザードが起動しますが、キャンセルボタンをクリックして、ウイザードを終了させてください。既存の設定が引き継がれた状態で利用が可能になります。<br>
