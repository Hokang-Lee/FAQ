<FONT SIZE="5" COLOR="#000000"><b>Windows Server 2003で動きますか？</b></FONT>
<HR>
<br>
はい。完全対応しています。<br>
<br>
なお、Windows Server 2003には、簡易SMTPサービスとPOP3サービスが用意されていますが、OSの「既定インストール」では、２つのサービスはインストールされないようです。そのため、意図して簡易SMTPサービスとPOP3サービスをインストールしない限り、その２つのサービスの停止および手動設定に変更する操作は必要ありません。<BR>
