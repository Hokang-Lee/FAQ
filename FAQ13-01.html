<FONT SIZE="5" COLOR="#000000">Enterprise II 版とStandard版の違いは何ですか？ </FONT>
<HR>
<br>
Enterprise II 版は、ファストスキャン版アンチウイルスエンジンが搭載されています。ウイルス検出の対象は、添付ファイルを含むメールデータのみに対して行われます。メールデータ以外のサーバマシン全体に対しては、ウイルス検出および検査対象とはしていませんので注意してください。<br>
<br>
一方、Standard版は、アンチウイルスエンジンを特に搭載していない、標準のメールサーバ製品です。<br>
