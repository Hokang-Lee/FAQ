<FONT SIZE="5" COLOR="#000000"><b>OSの自動更新機能は有効でもよいですか？</b></FONT>
<HR>
<br>
自動更新機能は有効にしないでください。<br>
<br>
自動更新が行われるタイミングで、OSが再起動することもあり、メールの送受信処理中にこれらが発生すると、正常な動作を保障できなくなります。<br>
<br>
また、Active Directory連携機能によって、Active Directoryのアカウントを利用している場合も、当然のことながら関連サーバが自動更新によって再起動が発生したりすると、ローカルユーザーに対する送受信の確認ができなくなります。<br>
<br>
従って、OSの自動更新は、通知のみの状態などにしておき、保守日程を決めた上で、更新を行うことを推奨いたします。<br>
