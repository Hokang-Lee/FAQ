<FONT SIZE="5" COLOR="#000000">Windows Server 2003 SP1やR2、SP2に対応していますか？</FONT>
<HR>
<br>
E-Post Mail Serverシリーズ、E-Post SMTP Serverシリーズ製品は、以下のWindows Server 2003製品に正式対応しております。特に問題なく、シリーズ製品のすべての機能を使うことができます。<br>
<ul>
<li>Windows Server 2003 SP1
<li>Windows Server 2003 R2
<li>Windows Server 2003 SP2
</ul>
