<FONT SIZE="5" COLOR="#000000">Webメール機能（メールクライアント）は付属していますか？ </FONT>
<HR>
<br>
E-Post Mail Server (x64) シリーズはメールサーバ本体であり、Webメール（メールクライアント）は付属しておりません。<br>
その代わり、オープンソースのWebメールソフトを提案しており、弊社ホームページの公開ダウンロードページには、Roundcube Webmail（Windows版）および RainLoop（Windows版）の日本語版インストールガイドや日本語版ユーザーズガイドを独自に作成して掲載しております。<br>
