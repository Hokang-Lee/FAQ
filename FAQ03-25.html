<FONT SIZE="4" COLOR="#000000"><b>外部ランタイムやDLLのバージョンについて別途必要とするものがあったり、影響はありますか？</b></FONT><br>
<HR>
<br>
E-Postシリーズは、基本的に外部ランタイムやDLLのバージョンについて、別途必要とするモジュールは特になく、影響されないようにしています。必要なものはインストール時に基本的には全部含まれております。<br>
ソフトウェア開発の段階でコンパイル時にランタイムの組み込みがされていますので、外部のランタイムやDLLのバージョンには影響されない仕組みです。<br>
