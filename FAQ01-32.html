<FONT SIZE="5" COLOR="#000000"><b>アカウント管理方法を切り替えるには</b></FONT>
<HR>
<BR>
Active Directory連携によるアカウント管理から、独自アカウント（Soft Account）方式に切り替えるなど、アカウント管理方法を変更する必要が生じたときは、次の方法で行います。<br>
<ol>
<li>アカウントマネージャより[設定]->[アカウント管理]を選択</li>
<li>設定ダイアログボックスが表示されるので、アカウント管理方法を選択</li>
</ol>
なお、管理方法の変更後は、必ず各サービスの再起動を行う必要があります。<BR>
