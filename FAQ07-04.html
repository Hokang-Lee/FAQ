<FONT SIZE="4" COLOR="#000000"><b>製品版CDインストール時に「エラー1316 ファイル[x:\folder]\E-Post_MSxxJP_Trialxx.msiから読み取る際にネットワークエラーが発生しました」と表示される</b></FONT>
<HR>
<br>
既に試用版をインストールしていた環境に対して、製品版CDから「修復インストール」を実行した場合にこのエラーが表示されます。<BR>
<br>
[対処方法]<br>
インストールされた試用版の各プログラムをすべて停止し、いったんアンインストールします。<u>OSを再起動しないで</u>、直後に製品版CDよりインストールを行って下さい。<br>
この操作で、試用版を使用していたときに設定した情報が消えることはありません。<br>
