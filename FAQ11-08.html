<FONT SIZE="5" COLOR="#000000">運用しようとするサーバ１台以外に、コールドスタンバイ型のサーバ、あるいはOSインストールされたホットスワップ型ディスクを用意する予定ですが、ライセンスは別々に必要でしょうか？</FONT>
<HR>
<br>
弊社製品のライセンスについては、OSインストールされたサーバマシンごとに必要です。基本的にはOSを単位としてカウントしてください。<br>
<br>
ですから１マシンの中に複数の仮想サーバを動作させるときでも、ライセンスはOSごとに必要です。<br>
<br>
なお、コールドスタンバイ型のサーバについては、弊社製品ではクラスタモデル版のライセンスをお薦めいたします。クラスタモデル版にはマシン２つ分のライセンスが用意されています。<br>
