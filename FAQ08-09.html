<FONT SIZE="4" COLOR="#000000"><b>Journal Optionのライセンスキー登録はどうすればよいですか</b></FONT>
<HR>
<br>
Journal Optionのライセンスキー登録は不要です。ヘルプにはライセンス登録が必要な旨、記述されていますが、登録しない状態でそのまま正常にお使いになれます。<br>
<br>
ただし、あくまでもE-Post Mail ServerあるいはE-Post SMTP Serverの本体側のライセンスキー登録状態に依存します。仮に評価版の状態でそのまお使いの場合、30日を過ぎると、本体の機能とともに、Journal Optionも働かなくなります。<br>
