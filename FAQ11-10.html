<FONT SIZE="5" COLOR="#000000">次年度更新での納品物はどのようなものがありますか？</FONT>
<HR>
<br>
次年度更新をご購入いただいた場合、次年度更新の納品物は次の通りです。<br>
<ul type=square>
<b><li>（Standard版の場合）</b><br>
・ベーシックサポートインシデント３つ分の証書<br>
・最新差分アップデートの収録CD<br>
<b><li>（Enterprise II 版の場合）</b><br>
・Enterprise II 用ライセンスキーの証書<br>
・ベーシックサポートインシデント３つ分の証書<br>
・最新差分アップデートの収録CD<br>
</ul>
ちなみに「サポート2」ログイン用IDは、次年度更新の納品物とは別に、ユーザー登録情報に基づいて後から郵送させていただいています。<br>
