<FONT SIZE="4" COLOR="#000000"><b>メーリングリストメンバーのアドレス後尾に半角スペースを間違えて入れてしまうとアドレスが２つ表示される</b></FONT>
<HR>
<br>
メーリングリスト設定画面から、メーリングリストメンバーのアドレス後尾に半角スペースを間違えて入れてしまうとメンバーアドレスが２つ表示される現象になります。２つあるように見えるメンバーアドレスは実は１つで、片方の１つを削除したときには、両方とも削除されます。<br>
<br>
このような現象になることを防ぐには、メンバーアドレス後尾に半角スペースを間違えて入れてしまわないよう、注意して運用してください。なお、2016年6月7日以降の最新差分アップデートでは、この現象が起きないよう対策が施されています。<br>
