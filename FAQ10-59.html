<FONT SIZE="4" COLOR="#000000"><b>追加処理プログラム指定時に自動転送も自動応答もしたくないときには</b></FONT>
<HR>
<br>
「追加処理プログラム」を指定するには、「メール制御」ダイアログボックスで自動応答または自動転送の設定を行い、合わせて追加処理プログラムを指定しますが、自動転送または自動応答の設定をしたくないときは、メールボックスフォルダ内に保存される IMS.CTL ファイル内に、下記の記述だけを残し、他の記述を削除して、保存します。<br>
自動転送および自動応答を行なわない状態のまま、追加処理プログラムを動作させることができます。<br>
<blockquote>
【IMS.CTL 変更例】
<hr color="#C0C0C0" align="left" width="80%" noshade size="1">
[AutoProcess]<br>
Module=&lt;標準コンソール専用追加処理プログラム&gt;<br>
<hr color="#C0C0C0" align="left" width="80%" noshade size="1">
</blockquote>
<br>
<p align="right"><input type="button" value="閉じる" onclick="window.close();"></p>
