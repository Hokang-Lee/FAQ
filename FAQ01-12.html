<FONT SIZE="4" COLOR="#000000"><b>メールボックスフォルダにユーザー毎のアクセス権を設定する場合</b></FONT>
<HR>
<BR>
メールボックスを新規作成するとデフォルトでは、アクセス権が<B>&quot;Evryone&quot;</B>に設定されます。<br>
<br>
それぞれのメールボックスフォルダに対し、ユーザー毎のアクセス権を設定、ログインアカウントでしかアクセスさせたくない場合、アクセス権から&quot;Evryone&quot;を削除する一方で、アクセス権に<B>&quot;SYSTEM&quot;</B>を追加設定します。これでメール受信が正しく行えるようになります。<br>
