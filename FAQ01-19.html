<FONT SIZE="4" COLOR="#000000"><b>旧シリーズの&quot;virus.dat&quot;がアンチウイルスソフトでウイルスに感染していると警告される</b></FONT>
<HR>
<br>
旧シリーズで利用されてきた&quot;virus.dat&quot;ファイルには、ウイルスの一部パターンマッチングデータが載っていました。この一部のパターンがウイルスチェックソフトで検出対象になる場合があります。<br>
<br>
これは、設定したパターンについてアンチウイルスソフト側で誤検出してしまったためですので、警告が気になる場合は、アンチウィルスソフトでファイル&quot;virus.dat&quot;を検索対象から除外する設定を行って下さい。<br>
