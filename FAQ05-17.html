<FONT SIZE="4" COLOR="#000000"><b>inlogフォルダ内にできるfromとtoフォルダについて</b></FONT>
<HR>
<br>
[inlog]フォルダの下に[from]フォルダと[to]フォルダができることがありますが、これは、E-Post Mail Server／E-Post SMTP Serverに付属のログアナライザーを実行したときに、集計のために自動作成されるフォルダです。<br>
ログアナライザーを実行しないときは、これらのフォルダは作成されません。また、製品本体はこれらのフォルダを使用しませんので、ログアナライザーを使用しないときは、フォルダを削除してかまいません。<br>
